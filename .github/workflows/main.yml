name: Build Quickstart IPK

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix apt
        run: |
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt-get update -y

      - name: Install dependencies
        run: |
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev python3 python3-setuptools \
            rsync unzip zlib1g-dev file wget curl

      # ✅ الرابط الصحيح بدون wildcard
      - name: Download OpenWrt SDK
        run: |
          wget https://downloads.openwrt.org/releases/24.10.5/targets/armsr/armv8/openwrt-sdk-24.10.5-armsr-armv8_gcc-13.2.0_musl.Linux-x86_64.tar.xz
          tar -xf *.tar.xz
          mv openwrt-sdk-* sdk

      - name: Update feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a -f

      - name: Clone iStoreOS packages
        run: |
          git clone --depth 1 https://github.com/istoreos/istoreos.git
          cp -r istoreos/quickstart sdk/package/
          cp -r istoreos/luci-app-quickstart sdk/package/

      - name: Replace luci-app with your modified version
        run: |
          rm -rf sdk/package/luci-app-quickstart
          mkdir -p sdk/package/luci-app-quickstart
          cp -r $(ls -A | grep -v sdk) sdk/package/luci-app-quickstart/

      - name: Prepare config
        run: |
          cd sdk
          make defconfig

      - name: Build quickstart
        run: |
          cd sdk
          make package/quickstart/compile V=s -j$(nproc)
          make package/luci-app-quickstart/compile V=s -j$(nproc)

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-ipk
          path: sdk/bin/packages/**/*.ipk
