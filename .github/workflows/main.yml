name: Build Quickstart IPK

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔧 إصلاح apt
      - name: Fix apt
        run: |
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt-get update -y

      # 📦 تثبيت المتطلبات
      - name: Install dependencies
        run: |
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev python3 python3-setuptools \
            rsync unzip zlib1g-dev file wget curl

      # 📥 تحميل SDK (مضمون 100%)
      - name: Download OpenWrt SDK
        run: |
          wget https://downloads.openwrt.org/releases/23.05.5/targets/armsr/armv8/openwrt-sdk-23.05.5-armsr-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf *.tar.xz
          DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*")
          mv "$DIR" sdk

      # 🔄 feeds
      - name: Update feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a -f

      # 🔥 جلب quickstart الصحيح
      - name: Clone quickstart packages
        run: |
          cd sdk/package
          git clone https://github.com/istoreos/istoreos-packages.git
          cp -r istoreos-packages/quickstart .
          git clone https://github.com/animegasan/luci-app-quickstart.git

      # 🔁 استبدال luci-app بنسختك
      - name: Replace luci-app with your modified version
        run: |
          rm -rf sdk/package/luci-app-quickstart
          mkdir -p sdk/package/luci-app-quickstart
          rsync -av --exclude=sdk ./ sdk/package/luci-app-quickstart/

      # ⚙️ config
      - name: Prepare config
        run: |
          cd sdk
          make defconfig

      # 🏗️ build
      - name: Build quickstart
        run: |
          cd sdk
          make package/quickstart/compile V=s -j$(nproc)
          make package/luci-app-quickstart/compile V=s -j$(nproc)

      # 🏷️ إنشاء Tag
      - name: Create tag
        id: tag
        run: |
          TAG=quickstart-$(date +%Y%m%d-%H%M)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # 🚀 إنشاء Release ورفع IPK
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Quickstart Build ${{ steps.tag.outputs.tag }}
          files: sdk/bin/packages/**/*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
