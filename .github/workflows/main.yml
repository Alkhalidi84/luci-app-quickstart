name: Build Quickstart (Full Buildroot)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev python3 rsync unzip \
            zlib1g-dev file wget

      # 🔥 تحميل OpenWrt كامل
      - name: Clone OpenWrt
        run: |
          git clone --depth 1 https://github.com/openwrt/openwrt.git
          cd openwrt

      # 🔄 feeds
      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 🔥 تحميل quickstart
      - name: Add quickstart
        run: |
          cd openwrt/package
          wget https://github.com/animegasan/luci-app-quickstart/archive/refs/heads/main.zip
          unzip main.zip
          mv luci-app-quickstart-main luci-app-quickstart

      # 🔥 إعداد config
      - name: Configure
        run: |
          cd openwrt
          make defconfig

      # 🔥 تفعيل الباكج
      - name: Enable package
        run: |
          cd openwrt
          echo "CONFIG_PACKAGE_luci-app-quickstart=y" >> .config
          echo "CONFIG_PACKAGE_quickstart=y" >> .config
          make defconfig

      # 🔥 build
      - name: Build
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      # 📦 جمع IPK
      - name: Collect IPK
        run: |
          mkdir output
          find openwrt/bin/packages -name "*quickstart*.ipk" -exec cp {} output/ \;

      # 🏷️ tag
      - name: Tag
        id: tag
        run: |
          TAG=quickstart-full-$(date +%Y%m%d-%H%M)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # 🚀 release
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: output/*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
