name: Build Quickstart IPK

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
          python3-distutils rsync unzip zlib1g-dev file wget

      - name: Download OpenWrt SDK
        run: |
          wget https://downloads.openwrt.org/releases/24.10.0/targets/armsr/armv8/openwrt-sdk-24.10.0-armsr-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf *.tar.xz
          mv openwrt-sdk-* sdk

      - name: Update feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Clone iStoreOS packages
        run: |
          git clone https://github.com/istoreos/istoreos.git
          cp -r istoreos/quickstart sdk/package/
          cp -r istoreos/luci-app-quickstart sdk/package/

      - name: Replace luci-app with your modified version
        run: |
          rm -rf sdk/package/luci-app-quickstart
          cp -r ./ sdk/package/luci-app-quickstart

      - name: Prepare config
        run: |
          cd sdk
          make defconfig

      - name: Build quickstart
        run: |
          cd sdk
          make package/quickstart/compile V=s
          make package/luci-app-quickstart/compile V=s

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-ipk
          path: sdk/bin/packages/**/*.ipk
