name: Build Quickstart Full (Stable)

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔧 Fix apt
      - name: Fix apt
        run: |
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt-get update -y

      # 📦 Dependencies
      - name: Install dependencies
        run: |
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev python3 python3-setuptools \
            rsync unzip zlib1g-dev file wget curl ca-certificates

      # 📥 SDK (Stable)
      - name: Download OpenWrt SDK
        run: |
          wget https://downloads.openwrt.org/releases/23.05.5/targets/armsr/armv8/openwrt-sdk-23.05.5-armsr-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf *.tar.xz
          DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*")
          mv "$DIR" sdk

      # 🔄 Feeds
      - name: Update feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a -f

      # ⏳ تقليل rate limit
      - name: Wait before clone
        run: sleep 20

      # 🔥 Clone with retry + token
      - name: Clone packages safely
        run: |
          cd sdk/package
          for i in 1 2 3; do
            git clone --depth 1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/animegasan/luci-app-quickstart.git && break || sleep 15
          done

      # 🔁 Replace with your version
      - name: Replace luci-app
        run: |
          rm -rf sdk/package/luci-app-quickstart
          mkdir -p sdk/package/luci-app-quickstart
          rsync -av --exclude=sdk --exclude=.git ./ sdk/package/luci-app-quickstart/

      # ⚙️ Config
      - name: Prepare config
        run: |
          cd sdk
          make defconfig

      # 🏗️ Build (robust)
      - name: Build quickstart
        run: |
          cd sdk
          make package/luci-app-quickstart/compile V=s -j$(nproc) || true

      # 📦 Collect IPK
      - name: Collect IPK
        run: |
          mkdir -p output
          find sdk/bin -name "*.ipk" -exec cp {} output/ \;

      # 🏷️ Tag
      - name: Create tag
        id: tag
        run: |
          TAG=quickstart-$(date +%Y%m%d-%H%M)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # 🚀 Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Quickstart Build ${{ steps.tag.outputs.tag }}
          files: output/*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
